name: NeuroTrade Signal Bot

on:
  schedule:
    # Borsa İstanbul Hafta İçi (Pazartesi - Cuma) Zamanlaması
    # GitHub UTC saatine göre çalışır (Türkiye Saati - 3 Saat)
    
    # 1. GÜN İÇİ SEANS: TR 10:00–18:30 (UTC 07:00–15:30), 30 dk
    - cron: '*/30 7-15 * * 1-5'

    # 2. AKŞAM ONAY: TR 20:00 (UTC 17:00) — günde bir; donuk kalır ertesi 20:00'a kadar
    - cron: '0 17 * * 1-5'

  # İstenildiğinde GitHub üzerinden manuel çalıştırabilmek için buton ekler
  workflow_dispatch:
    inputs:
      kategori:
        description: "JSON hedefi (auto = TR saatine göre seans/onay)"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - seans
          - onay

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # Botun JSON dosyalarını (seans.json, onay.json) GitHub'a kaydedebilmesi için gerekli yetki
    permissions:
      contents: write 

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v5
        
      - name: Node.js Kurulumu
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          package-manager-cache: false
          
      - name: Bağımlılıkları Yükle
        run: |
          npm install puppeteer @puppeteer/browsers axios @google-cloud/storage
          
      - name: Tarama Motorunu Çalıştır
        env:
          # GitHub Secrets üzerinden alınacak güvenlik anahtarları
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # Firebase Storage — NeuroTrade uygulaması buradan okur (secret zorunlu)
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_STORAGE_BUCKET: neurotrade-admin.firebasestorage.app
          FIREBASE_SIGNALS_PREFIX: signals

          # GitHub'ın bu işlem için anlık ürettiği otomatik yetki tokeni
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_BRANCH: main
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          BOT_CATEGORY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.kategori != 'auto' && github.event.inputs.kategori || '' }}
        run: node bot.js
