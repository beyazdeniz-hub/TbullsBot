name: Refresh Formations (Manual)

# Yalnızca GitHub Actions → Run workflow ile tetiklenir.
# Ana bot zamanlaması (bot.yml cron) etkilenmez.

on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bağımlılıkları Yükle
        run: npm install puppeteer @puppeteer/browsers

      - name: Formasyon ve formationDates Yenile
        run: node refreshFormations.js

      - name: Firebase Storage Sync
        env:
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          npm install @google-cloud/storage axios
          node -e "require('./firebaseSync').syncSignalsToFirebase().then(r=>console.log(r)).catch(e=>{console.error(e);process.exit(1)})"
