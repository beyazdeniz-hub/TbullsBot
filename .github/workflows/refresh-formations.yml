name: Refresh Formations (Manual)

# Yalnızca GitHub Actions → Run workflow ile tetiklenir.
# Ana bot zamanlaması (bot.yml cron) etkilenmez.

on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bağımlılıkları Yükle
        run: npm install puppeteer @puppeteer/browsers @google-cloud/storage axios

      - name: Formasyon ve formationDates Yenile
        run: node refreshFormations.js

      - name: JSON Degisikliklerini GitHub'a Kaydet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seans.json onay.json
          if git diff --staged --quiet; then
            echo "JSON degisikligi yok"
          else
            git commit -m "refresh formationDates $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

      - name: Firebase Storage Sync
        env:
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node -e "
          const fs = require('fs');
          const snaps = {};
          for (const f of ['seans.json', 'onay.json', 'history.json', 'signals.json']) {
            if (fs.existsSync(f)) snaps[f] = JSON.parse(fs.readFileSync(f, 'utf8'));
          }
          require('./firebaseSync').syncSignalsToFirebase(snaps)
            .then((r) => { console.log(JSON.stringify(r)); if (!r.ok && !r.skipped) process.exit(1); })
            .catch((e) => { console.error(e); process.exit(1); });
          "
